<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>App Chat Firebase</title>
</head>
<body>

<h2>App Chat</h2>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button id="login">Se connecter</button>
  <button id="signup">Créer un compte</button>
  <p id="msg"></p>
</div>

<hr>

<!-- CHAT -->
<div id="chatBox" style="display:none">

  <p id="user"></p>

  <input id="friendEmail" placeholder="Email ami">
  <button id="addFriend">Ouvrir chat</button>

  <h3 id="title"></h3>

  <div id="messages" style="height:250px; overflow:auto; border:1px solid black;"></div>

  <input id="message" placeholder="Message">
  <button id="send">Envoyer</button>

  <button id="logout">Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentFriend = null;

/* UI */
const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("chatBox");

/* LOGIN */
document.getElementById("login").onclick = () => {
  signInWithEmailAndPassword(auth,
    email.value,
    password.value
  )
  .then(() => {})
  .catch(e => msg.textContent = e.message);
};

/* SIGNUP */
document.getElementById("signup").onclick = () => {
  createUserWithEmailAndPassword(auth,
    email.value,
    password.value
  )
  .then(() => {})
  .catch(e => msg.textContent = e.message);
};

/* CHECK AUTH */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    loginBox.style.display = "block";
    chatBox.style.display = "none";
    return;
  }

  currentUser = user;

  loginBox.style.display = "none";
  chatBox.style.display = "block";

  document.getElementById("user").textContent =
    "Connecté : " + user.email;
});

/* AMI */
document.getElementById("addFriend").onclick = () => {
  currentFriend = document.getElementById("friendEmail").value;

  document.getElementById("title").textContent =
    "Chat avec " + currentFriend;

  loadMessages();
};

/* ENVOYER */
document.getElementById("send").onclick = async () => {

  if (!currentUser || !currentFriend) return;

  const msg = document.getElementById("message").value;

  await addDoc(collection(db, "messages"), {
    from: currentUser.email,
    to: currentFriend,
    text: msg,
    time: Date.now()
  });

  document.getElementById("message").value = "";
};

/* LOAD */
function loadMessages() {

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snap) => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(doc => {
      const m = doc.data();

      if (
        (m.from === currentUser.email && m.to === currentFriend) ||
        (m.from === currentFriend && m.to === currentUser.email)
      ) {
        box.innerHTML += `<p><b>${m.from}</b> : ${m.text}</p>`;
      }
    });

  });
}

/* LOGOUT */
document.getElementById("logout").onclick = () => {
  signOut(auth);
};

</script>

</body>
</html>
