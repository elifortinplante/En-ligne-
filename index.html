<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login Firebase</title>
</head>

<body>

<h2>Connexion</h2>

<!-- ✔️ UI OBLIGATOIRE -->
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<br><br>

<button id="signup">Créer un compte</button>
<button id="login">Se connecter</button>

<hr>

<p id="status">Pas connecté</p>

<input id="dataInput" placeholder="Test sauvegarde">
<button id="save">Sauvegarder</button>

<p id="output"></p>

<button id="logout">Déconnexion</button>

<script type="module">

/* ✔️ 1. IMPORTS (corrigé) */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* ✔️ 2. CONFIG FIREBASE (le tien) */
const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};


/* ✔️ 3. INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


/* ✔️ 4. VARIABLES DOM */
const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");
const output = document.getElementById("output");


let currentUser = null;


/* ✔️ 5. INSCRIPTION */
document.getElementById("signup").onclick = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Compte créé"))
    .catch(err => alert(err.message));
};


/* ✔️ 6. CONNEXION (corrigé) */
document.getElementById("login").onclick = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Connecté"))
    .catch(err => alert(err.message));
};


/* ✔️ 7. SURVEILLER CONNEXION */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    currentUser = null;
    status.textContent = "Pas connecté";
    return;
  }

  currentUser = user;
  status.textContent = "Connecté : " + user.email;

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    output.textContent = "Sauvegardé : " + snap.data().text;
  }
});


/* ✔️ 8. SAUVEGARDE */
document.getElementById("save").onclick = async () => {

  if (!currentUser) {
    alert("Tu dois être connecté");
    return;
  }

  const value = document.getElementById("dataInput").value;

  await setDoc(doc(db, "users", currentUser.uid), {
    text: value
  });

  output.textContent = "Sauvegardé : " + value;
};


/* ✔️ 9. LOGOUT */
document.getElementById("logout").onclick = () => {
  signOut(auth);
};

</script>

</body>
</html>
