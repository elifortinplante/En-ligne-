<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Flashcards Online</title>
</head>
<body>

<h2>Flashcards</h2>

<p id="user"></p>

<!-- CRÉER FLASHCARD -->
<input id="question" placeholder="Question">
<input id="answer" placeholder="Réponse">
<button id="add">Ajouter</button>

<hr>

<!-- AFFICHAGE -->
<div id="list"></div>

<button id="logout">Déconnexion</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  where,
  onSnapshot,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* PROTECTION */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  document.getElementById("user").textContent =
    "Connecté : " + user.email;

  loadFlashcards();
});

/* AJOUT FLASHCARD */
document.getElementById("add").onclick = async () => {

  const q = document.getElementById("question").value;
  const a = document.getElementById("answer").value;

  if (!q || !a) return;

  await addDoc(collection(db, "flashcards"), {
    user: currentUser.uid,
    question: q,
    answer: a,
    time: Date.now()
  });

  document.getElementById("question").value = "";
  document.getElementById("answer").value = "";
};

/* CHARGER FLASHCARDS */
function loadFlashcards() {

  const q = query(
    collection(db, "flashcards"),
    where("user", "==", currentUser.uid),
    orderBy("time")
  );

  onSnapshot(q, (snap) => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    snap.forEach(doc => {
      const f = doc.data();

      list.innerHTML += `
        <div style="border:1px solid black; margin:5px; padding:5px">
          <b>Q:</b> ${f.question}<br>
          <b>R:</b> ${f.answer}
        </div>
      `;
    });

  });
}

/* LOGOUT */
document.getElementById("logout").onclick = () => {
  signOut(auth);
};

</script>

</body>
</html>
