<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flashcards App</title>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

<!-- Firebase (modular CDN) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

/* ================= USER ================= */
let user = null;

/* ================= LOGIN ================= */
window.loginGoogle = async function () {
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert("Erreur connexion Google");
    console.log(e);
  }
};

window.logout = async function () {
  await signOut(auth);
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, async (u) => {
  user = u;

  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("user-name").textContent = user.displayName;

    loadUserData();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

/* ================= CLOUD SAVE ================= */
window.saveToCloud = async function (sets) {
  if (!user) return;

  await setDoc(doc(db, "users", user.uid), {
    sets,
    gems,
    fireDays
  });
};

/* ================= LOAD ================= */
async function loadUserData() {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    sets = data.sets || [];
    gems = data.gems || 0;
    fireDays = data.fireDays || 0;

    updateGemsUI();
    updateFireUI();
    displaySets();
  }
}

/* ================= LEADERBOARD ================= */
window.loadLeaderboard = async function () {
  const col = collection(db, "users");
  const snap = await getDocs(col);

  let list = [];

  snap.forEach(d => {
    const data = d.data();
    list.push({
      name: data.name || "User",
      gems: data.gems || 0
    });
  });

  list.sort((a,b)=>b.gems-a.gems);

  document.getElementById("leaderboard").innerHTML =
    list.slice(0,10).map(u =>
      `<div>${u.name} — 💎 ${u.gems}</div>`
    ).join("");
};

</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#a18cd1,#fbc2eb,#8fd3f4);
}

#login-screen {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.container { display:none; padding:20px; }

.user-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>

</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <h1>Flashcards</h1>
  <button onclick="loginGoogle()">🔐 Connexion Google</button>
</div>

<!-- ================= APP ================= -->
<div id="app" class="container">

  <div class="user-bar">
    <div>
      👤 <span id="user-name"></span>
    </div>
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Mes sets</h2>

  <button onclick="loadLeaderboard()">🏆 Leaderboard</button>
  <div id="leaderboard"></div>

  <!-- 👉 TON CODE EXISTANT ICI -->
  <div id="home-screen"></div>

</div>

<script>
/* ================= TON CODE ORIGINAL ================= */

let sets = [];
let gems = 0;
let fireDays = 0;

function updateGemsUI(){
  console.log("gems:", gems);
}

function updateFireUI(){
  console.log("fire:", fireDays);
}

function displaySets(){
  console.log("sets:", sets);
}

/* Sauvegarde auto cloud */
setInterval(() => {
  if (user) {
    window.saveToCloud(sets);
  }
}, 5000);

</script>

</body>
</html>
