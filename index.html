<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>App Firebase Login</title>
</head>
<body>

<h2>Connexion / Inscription</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button id="signup">Créer un compte</button>
<button id="login">Se connecter</button>

<hr>

<h3>Test après connexion</h3>
<p id="status">Pas connecté</p>

<input id="dataInput" placeholder="Écris un test">
<button id="save">Sauvegarder</button>

<p id="output"></p>

<button id="logout">Déconnexion</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import { 
    getFirestore, 
    doc, 
    setDoc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 CONFIG FIREBASE (le tien)
  const firebaseConfig = {
    apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
    authDomain: "flashcard-2c124.firebaseapp.com",
    projectId: "flashcard-2c124",
    storageBucket: "flashcard-2c124.firebasestorage.app",
    messagingSenderId: "874120400032",
    appId: "1:874120400032:web:580f1de61498e0134b4dc5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const status = document.getElementById("status");

  let user = null;

  // 🔐 INSCRIPTION
  document.getElementById("signup").onclick = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        alert("Compte créé !");
      })
      .catch(e => alert(e.message));
  };

  // 🔐 CONNEXION
  document.getElementById("login").onclick = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        alert("Connecté !");
      })
      .catch(e => alert(e.message));
  };

  // 👀 SURVEILLER CONNEXION
  onAuthStateChanged(auth, async (u) => {
    if (u) {
      user = u;
      status.textContent = "Connecté : " + u.email;

      const docRef = doc(db, "users", u.uid);
      const snap = await getDoc(docRef);

      if (snap.exists()) {
        document.getElementById("output").textContent =
          "Sauvegardé : " + snap.data().text;
      }
    } else {
      user = null;
      status.textContent = "Pas connecté";
    }
  });

  // 💾 SAUVEGARDE TEST
  document.getElementById("save").onclick = async () => {
    if (!user) return alert("Pas connecté");

    const value = document.getElementById("dataInput").value;

    await setDoc(doc(db, "users", user.uid), {
      text: value
    });

    document.getElementById("output").textContent =
      "Sauvegardé : " + value;
  };

  // 🚪 DÉCONNEXION
  document.getElementById("logout").onclick = () => {
    signOut(auth);
  };

</script>

</body>
</html>
