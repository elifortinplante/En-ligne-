<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
</head>
<body>

<h2>Connexion</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button id="login">Se connecter</button>
<button id="signup">Créer un compte</button>

<p id="message"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // TON CONFIG (déjà bon)
  const firebaseConfig = {
    apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
    authDomain: "flashcard-2c124.firebaseapp.com",
    projectId: "flashcard-2c124",
    storageBucket: "flashcard-2c124.firebasestorage.app",
    messagingSenderId: "874120400032",
    appId: "1:874120400032:web:580f1de61498e0134b4dc5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const message = document.getElementById("message");

  // INSCRIPTION
  document.getElementById("signup").onclick = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        message.textContent = "Compte créé !";
      })
      .catch((error) => {
        message.textContent = error.message;
      });
  };

  // CONNEXION
  document.getElementById("login").onclick = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => {
        message.textContent = "Connexion réussie !";
        window.location.href = "app.html";
      })
      .catch((error) => {
        message.textContent = error.message;
      });
  };

  // SI DÉJÀ CONNECTÉ
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "app.html";
    }
  });

</script>

</body>
</html>
