<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chat sécurisé</title>
</head>
<body>

<h2 id="title">Chat</h2>
<p id="user">Vérification connexion...</p>

<hr>

<input id="friendEmail" placeholder="Email de l'ami">
<button id="addFriend">Ouvrir chat</button>

<hr>

<div id="chatBox" style="height:250px; overflow:auto; border:1px solid black;"></div>

<input id="message" placeholder="Message">
<button id="send">Envoyer</button>

<br><br>
<button id="logout">Déconnexion</button>

<script type="module">

/* ✔️ IMPORTS */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✔️ CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentFriend = null;

/* ✔️ 1. BLOCAGE SI PAS CONNECTÉ */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "index.html"; // retour login
    return;
  }

  currentUser = user;
  document.getElementById("user").textContent =
    "Connecté : " + user.email;
});

/* ✔️ 2. OUVRIR CHAT AMI */
document.getElementById("addFriend").onclick = () => {
  currentFriend = document.getElementById("friendEmail").value;

  document.getElementById("title").textContent =
    "Chat avec " + currentFriend;

  loadMessages();
};

/* ✔️ 3. ENVOYER MESSAGE */
document.getElementById("send").onclick = async () => {

  if (!currentUser || !currentFriend) return;

  const msg = document.getElementById("message").value;

  await addDoc(collection(db, "messages"), {
    from: currentUser.email,
    to: currentFriend,
    text: msg,
    time: Date.now()
  });

  document.getElementById("message").value = "";
};

/* ✔️ 4. MESSAGES TEMPS RÉEL */
function loadMessages() {

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {

    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    snapshot.forEach((doc) => {
      const m = doc.data();

      if (
        (m.from === currentUser.email && m.to === currentFriend) ||
        (m.from === currentFriend && m.to === currentUser.email)
      ) {
        box.innerHTML += `<p><b>${m.from}</b> : ${m.text}</p>`;
      }
    });

  });
}

/* ✔️ 5. LOGOUT */
document.getElementById("logout").onclick = () => {
  signOut(auth);
};

</script>

</body>
</html>
