<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards App</title>

<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* ================= LOGIN ================= */
window.loginEmail = async function () {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (e) {
    alert("Erreur connexion");
    console.log(e);
  }
};

window.registerEmail = async function () {
  try {
    await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (e) {
    alert("Erreur création compte");
    console.log(e);
  }
};

window.logout = async function () {
  await signOut(auth);
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, async (u) => {
  user = u;

  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("user-email").textContent = user.email;

    await loadCloud();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

/* ================= CLOUD ================= */
async function saveCloud() {
  if (!user) return;

  await setDoc(doc(db, "users", user.uid), {
    sets,
    gems,
    fireDays
  });
}

async function loadCloud() {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    sets = data.sets || [];
    gems = data.gems || 0;
    fireDays = data.fireDays || 0;

    updateGemsUI();
    updateFireUI();
    displaySets();
  }
}

/* auto sync */
setInterval(() => {
  if (user) saveCloud();
}, 5000);

</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#a18cd1,#fbc2eb,#8fd3f4);
}

.hidden { display:none; }

#login-screen {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
}

#app {
  display:none;
  padding:20px;
}

input {
  padding:10px;
  margin:5px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
  <h1>Flashcards</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="loginEmail()">Connexion</button>
  <button onclick="registerEmail()">Créer compte</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

  <div style="display:flex; justify-content:space-between;">
    <div>👤 <span id="user-email"></span></div>
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Mes sets</h2>

  <div id="sets-list"></div>

</div>

<script>
/* ================= TON CODE ================= */

let sets = JSON.parse(localStorage.getItem("sets")) || [];
let gems = 0;
let fireDays = 0;

function updateGemsUI(){}
function updateFireUI(){}

function displaySets(){
  const list = document.getElementById("sets-list");
  list.innerHTML = "";

  sets.forEach((s,i)=>{
    const div = document.createElement("div");
    div.innerHTML = `
      <h3>${s.title}</h3>
      <small>${s.subject}</small>
    `;
    list.appendChild(div);
  });
}

/* save local backup */
setInterval(()=>{
  localStorage.setItem("sets", JSON.stringify(sets));
},2000);

</script>

</body>
</html>
