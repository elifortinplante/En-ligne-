<!DOCTYPE html>
<html>
<head>
  <title>App</title>
</head>
<body>

<h1>Bienvenue 🔥</h1>

<input id="dataInput" placeholder="Écris quelque chose">
<button id="save">Sauvegarder</button>

<p id="output"></p>

<button id="logout">Se déconnecter</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
    authDomain: "flashcard-2c124.firebaseapp.com",
    projectId: "flashcard-2c124",
    storageBucket: "flashcard-2c124.firebasestorage.app",
    messagingSenderId: "874120400032",
    appId: "1:874120400032:web:580f1de61498e0134b4dc5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const input = document.getElementById("dataInput");
  const output = document.getElementById("output");

  let currentUser = null;

  // Vérifie si connecté
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }

    currentUser = user;

    // Charger les données existantes
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      output.textContent = "Sauvegardé : " + docSnap.data().text;
    }
  });

  // Sauvegarder
  document.getElementById("save").onclick = async () => {
    if (!currentUser) return;

    await setDoc(doc(db, "users", currentUser.uid), {
      text: input.value
    });

    output.textContent = "Sauvegardé : " + input.value;
  };

  // Déconnexion
  document.getElementById("logout").onclick = () => {
    signOut(auth).then(() => {
      window.location.href = "index.html";
    });
  };

</script>

</body>
</html>
