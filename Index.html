<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Firebase</title>
</head>
<body>

  <h2>Mon texte partagé</h2>

  <input type="text" id="textInput" placeholder="Écris quelque chose">
  <button onclick="saveText()">Enregistrer</button>

  <p id="output"></p>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 CONFIG (à remplacer avec TON Firebase)
    const firebaseConfig = {
      apiKey: "AIzaSyBfB2J2Tk-QBeTCKEIC4ybYkpiwymavDOU",
  authDomain: "flashcard-2c124.firebaseapp.com",
  projectId: "flashcard-2c124",
  storageBucket: "flashcard-2c124.firebasestorage.app",
  messagingSenderId: "874120400032",
  appId: "1:874120400032:web:580f1de61498e0134b4dc5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const docRef = doc(db, "test", "monTexte");

    // 💾 Enregistrer texte
    window.saveText = async function () {
      const text = document.getElementById("textInput").value;
      await setDoc(docRef, { contenu: text });
    };

    // 🔄 Lire en temps réel
    onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        document.getElementById("output").textContent = docSnap.data().contenu;
      }
    });
  </script>

</body>
</html>
